<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  * { box-sizing: border-box; }

  .bio-root {
    font-family: 'Inter', sans-serif;
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    color: #fff;
  }

  .gif-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://i.pinimg.com/originals/c3/93/de/c393de62970df6a45ddd7bc65935fb96.gif');
    background-size: cover;
    background-position: center;
    filter: brightness(0.35) saturate(1.3);
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.6) 100%);
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 3vh 20px 2vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .badge {
    background: rgba(255,255,255,0.12);
    border: 0.5px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 14px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 1.5vh;
    flex-shrink: 0;
  }

  .avatar {
    width: clamp(60px, 9vh, 88px);
    height: clamp(60px, 9vh, 88px);
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.6);
    background: linear-gradient(135deg, #7F77DD, #D4537E);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 1.4vh;
    flex-shrink: 0;
    padding: 0;
    overflow: hidden;
  }

  .handle {
    font-size: clamp(16px, 2.5vh, 22px);
    font-weight: 700;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 0.5vh;
    flex-shrink: 0;
  }

  .tagline {
    font-size: clamp(11px, 1.4vh, 13px);
    color: rgba(255,255,255,0.65);
    text-align: center;
    margin-bottom: 2vh;
    line-height: 1.5;
    max-width: 300px;
    flex-shrink: 0;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    width: 100%;
    text-align: left;
    margin-bottom: 0.8vh;
    padding-left: 2px;
    flex-shrink: 0;
  }

  .links-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 0.9vh, 10px);
    margin-bottom: 2vh;
    flex-shrink: 0;
  }

  .link-card {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: clamp(9px, 1.4vh, 14px) 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-decoration: none;
    color: #fff;
    backdrop-filter: blur(4px);
  }
  .link-card:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .link-icon svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  .link-text { flex: 1; }
  .link-title { font-size: clamp(12px, 1.4vh, 14px); font-weight: 500; }
  .link-sub { font-size: clamp(10px, 1.1vh, 11px); color: rgba(255,255,255,0.5); margin-top: 2px; }

  .link-arrow {
    font-size: 16px;
    color: rgba(255,255,255,0.35);
    line-height: 1;
  }

  .members-section {
    width: 100%;
    margin-bottom: 2vh;
    flex-shrink: 0;
  }

  .members-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(6px, 0.9vh, 10px);
  }

  .member-card {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.13);
    border-radius: 12px;
    padding: clamp(8px, 1.2vh, 14px) 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(4px, 0.7vh, 8px);
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: #fff;
  }
  .member-card:hover { background: rgba(255,255,255,0.15); }

  .member-avatar {
    width: clamp(34px, 4.5vh, 46px);
    height: clamp(34px, 4.5vh, 46px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(13px, 1.6vh, 18px);
    font-weight: 700;
    flex-shrink: 0;
  }

  .member-name { font-size: clamp(10px, 1.2vh, 12px); font-weight: 500; text-align: center; }
  .member-role { font-size: clamp(9px, 1vh, 10px); color: rgba(255,255,255,0.45); text-align: center; }

  .footer {
    font-size: clamp(9px, 1.1vh, 11px);
    color: rgba(255,255,255,0.25);
    text-align: center;
    flex-shrink: 0;
  }

  .divider {
    width: 100%;
    height: 0.5px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 2vh;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<audio id="bg-audio" loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const audio = document.getElementById('bg-audio');
    audio.volume = 1;
    audio.play().catch(() => {
      const unlock = () => {
        audio.play();
        document.removeEventListener('click', unlock);
        document.removeEventListener('touchstart', unlock);
      };
      document.addEventListener('click', unlock);
      document.addEventListener('touchstart', unlock);
    });
  });
</script>

</body>
